<!DOCTYPE html>
<html>
<head><title>Track Complaint</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-5 text-center">
    <div class="card p-4 mx-auto shadow" style="max-width: 400px;">
        <h3>🔍 Track Status</h3>
        <form method="POST">
            <input type="number" name="complaint_id" class="form-control mb-3" placeholder="Enter Tracking ID" required>
            <button class="btn btn-dark w-100 shadow">Check Status</button>
        </form>
        {% if complaint %}
        <div class="mt-4 p-3 border rounded bg-white">
            <h5>Status: <span class="badge bg-{{ 'success' if complaint.status == 'Resolved' else 'warning' }}">{{ complaint.status }}</span></h5>
            <p class="mb-0 mt-2">Subject: {{ complaint.subject }}</p>
        </div>
        {% endif %}
        <a href="/" class="mt-4 d-block text-muted small">← Back to Home</a>
    </div>
</body>
</html>
