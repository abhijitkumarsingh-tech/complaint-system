<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Join Portal | Student Registration</title>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { 
            background: #ffffff; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-top: 8px solid #10b981; 
        }
        .dark-label { color: #000000 !important; font-weight: 800; }
    </style>
</head>
<body class="bg-[#f0fdf4] flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-[420px] rounded-[2.5rem] p-10 transition-all duration-500 hover:shadow-2xl">
        
        <header class="text-center mb-10">
            <h1 class="text-[10px] font-black text-emerald-600 uppercase tracking-[0.4em] mb-2 italic">New Account</h1>
            <h2 class="text-3xl font-black text-black tracking-tight italic uppercase">Student Register</h2>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}
            <div class="mb-6 p-4 rounded-2xl bg-rose-50 text-rose-600 text-sm font-black border border-rose-100 text-center uppercase tracking-tighter">
                {{ msg }}
            </div>
          {% endfor %}{% endif %}
        {% endwith %}

        <form action="/register" method="POST" class="space-y-5">
            <input type="hidden" name="role" value="Student">
            
            <div class="space-y-1">
                <label class="text-[11px] dark-label uppercase tracking-widest ml-1">Official Email</label>
                <input type="email" name="email" placeholder="example@gmail.com" class="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-emerald-500 focus:bg-white rounded-2xl text-sm font-bold transition-all outline-none text-black" required>
            </div>

            <div class="space-y-1">
                <label class="text-[11px] dark-label uppercase tracking-widest ml-1">Choose Username</label>
                <input type="text" name="username" placeholder="Choose unique ID" class="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-emerald-500 focus:bg-white rounded-2xl text-sm font-bold transition-all outline-none text-black" required>
            </div>
            
            <div class="space-y-1">
                <label class="text-[11px] dark-label uppercase tracking-widest ml-1">Create Password</label>
                <div class="relative">
                    <input type="password" name="password" id="regPass" placeholder="••••••••" class="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-emerald-500 focus:bg-white rounded-2xl text-sm font-bold transition-all outline-none text-black" required>
                    <button type="button" id="regEyeBtn" class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-emerald-600 uppercase tracking-tighter">Show</button>
                </div>
            </div>
            
            <button type="submit" class="w-full py-4 bg-black text-white font-black rounded-2xl shadow-lg shadow-emerald-100 hover:bg-emerald-600 transition-all duration-300 active:scale-95 uppercase tracking-widest text-xs">
                Register Account 
            </button>
        </form>
        
        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-sm font-bold text-slate-500">
                Already registered? <a href="/" class="text-emerald-600 font-black hover:underline decoration-2">Log in here</a>
            </p>
        </div>
    </div>

    <script>
        const regEyeBtn = document.getElementById('regEyeBtn');
        const regPassField = document.getElementById('regPass');
        regEyeBtn.addEventListener('click', () => {
            const isPass = regPassField.type === 'password';
            regPassField.type = isPass ? 'text' : 'password';
            regEyeBtn.textContent = isPass ? 'Hide' : 'Show';
        });
    </script>
</body>
</html>
