<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Secure Login | Campus Portal</title>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { 
            background: #ffffff; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #000000;
        }
        .admin-glow { border-top: 12px solid #000000; }
        .student-glow { border-top: 12px solid #4f46e5; }
        .dark-label { color: #000000 !important; font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; }
        .input-active:focus { transform: translateY(-2px); border-color: #000000; }
    </style>
</head>
<body class="bg-[#f0f4f8] flex items-center justify-center min-h-screen p-4">

    <div id="card" class="glass-card student-glow w-full max-w-[420px] rounded-[2.5rem] p-10 transform">
        
        <header class="text-center mb-10">
            <h1 id="brand" class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.4em] mb-2 italic transition-colors">Campus Support</h1>
            <h2 id="title" class="text-3xl font-black text-black tracking-tight italic uppercase">Student Login</h2>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}
            <div class="mb-6 p-4 rounded-2xl {% if cat == 'error' %}bg-rose-600 text-white{% elif cat == 'warning' %}bg-amber-500 text-white{% else %}bg-emerald-600 text-white{% endif %} text-xs font-black border-2 border-black/10 text-center uppercase tracking-tighter shadow-sm">
                {{ msg }}
            </div>
          {% endfor %}{% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-6" autocomplete="off">
            <input type="hidden" name="login_mode" id="loginMode" value="student_portal">
            
            <div class="space-y-2">
                <label class="dark-label ml-1">Username Identifier</label>
                <input type="text" name="username" placeholder="Enter unique ID" class="w-full p-4 bg-slate-50 border-2 border-slate-200 focus:border-black focus:bg-white rounded-2xl text-sm font-black transition-all outline-none text-black input-active" required>
            </div>
            
            <div class="space-y-2">
                <label class="dark-label ml-1">Security Credentials</label>
                <div class="relative">
                    <input type="password" name="password" id="loginPass" placeholder="••••••••" class="w-full p-4 bg-slate-50 border-2 border-slate-200 focus:border-black focus:bg-white rounded-2xl text-sm font-black transition-all outline-none text-black input-active" required>
                    <button type="button" onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-400 hover:text-black uppercase tracking-tighter">View</button>
                </div>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full py-4 bg-black text-white font-black rounded-2xl shadow-xl hover:bg-indigo-700 transition-all duration-300 active:scale-95 uppercase tracking-[0.2em] text-xs">
                Login to Portal
            </button>
        </form>
        
        <div id="studentLinks" class="mt-8 text-center space-y-6">
            <p class="text-sm font-black text-slate-500 uppercase tracking-tighter">
                New User? <a href="/register" class="text-indigo-600 font-black hover:underline decoration-2">Register Account</a>
            </p>
            <div class="pt-4 border-t-2 border-slate-100">
                <button onclick="toggleAdmin(true)" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-black transition-colors flex items-center justify-center gap-2 mx-auto">
                    Administrative Security
                </button>
            </div>
        </div>

        <div id="adminLinks" class="mt-8 text-center hidden">
            <button onclick="toggleAdmin(false)" class="text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-indigo-600 transition-colors italic">
                Return to Student Login
            </button>
        </div>
    </div>

    <script>
        function togglePass() {
            const p = document.getElementById('loginPass');
            const btn = event.target;
            if (p.type === "password") {
                p.type = "text";
                btn.innerText = "Hide";
            } else {
                p.type = "password";
                btn.innerText = "View";
            }
        }

        function toggleAdmin(isAdmin) {
            const card = document.getElementById('card');
            const title = document.getElementById('title');
            const brand = document.getElementById('brand');
            const btn = document.getElementById('loginBtn');
            const sLinks = document.getElementById('studentLinks');
            const aLinks = document.getElementById('adminLinks');
            const modeInput = document.getElementById('loginMode');

            if(isAdmin) {
                card.classList.replace('student-glow', 'admin-glow');
                brand.classList.replace('text-indigo-600', 'text-slate-500');
                title.innerText = "Admin Security";
                btn.classList.replace('bg-black', 'bg-slate-900');
                sLinks.classList.add('hidden');
                aLinks.classList.remove('hidden');
                modeInput.value = "admin_hq"; // Isse app.py ko pata chalega ki Admin login ho raha hai
            } else {
                card.classList.replace('admin-glow', 'student-glow');
                brand.classList.replace('text-slate-500', 'text-indigo-600');
                title.innerText = "Student Login";
                btn.classList.replace('bg-slate-900', 'bg-black');
                sLinks.classList.remove('hidden');
                aLinks.classList.add('hidden');
                modeInput.value = "student_portal";
            }
        }
    </script>
</body>
</html>
