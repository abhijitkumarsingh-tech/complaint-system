<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Secure Login | Campus Portal</title>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { 
            background: #ffffff; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .admin-glow { border-top: 8px solid #000000; }
        .student-glow { border-top: 8px solid #4f46e5; }
        /* Labels ko ekdum dark karne ke liye */
        .dark-label { color: #000000 !important; font-weight: 800; }
    </style>
</head>
<body class="bg-[#f0f4f8] flex items-center justify-center min-h-screen p-4">

    <div id="card" class="glass-card student-glow w-full max-w-[420px] rounded-[2.5rem] p-10 transition-all duration-500 transform hover:scale-[1.01]">
        
        <header class="text-center mb-10">
            <h1 class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.4em] mb-2 italic">Campus Support</h1>
            <h2 id="title" class="text-3xl font-black text-black tracking-tight italic uppercase">Student Login</h2>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}
            <div class="mb-6 p-4 rounded-2xl bg-rose-50 text-rose-600 text-sm font-black border border-rose-100 text-center uppercase tracking-tighter">
                {{ msg }}
            </div>
          {% endfor %}{% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[11px] dark-label uppercase tracking-widest ml-1">Username / ID</label>
                <input type="text" name="username" placeholder="Enter your ID" class="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-indigo-600 focus:bg-white rounded-2xl text-sm font-bold transition-all outline-none text-black" required>
            </div>
            
            <div class="space-y-2">
                <label class="text-[11px] dark-label uppercase tracking-widest ml-1">Password</label>
                <input type="password" name="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-indigo-600 focus:bg-white rounded-2xl text-sm font-bold transition-all outline-none text-black" required>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full py-4 bg-black text-white font-black rounded-2xl shadow-xl hover:bg-indigo-700 transition-all duration-300 active:scale-95 uppercase tracking-[0.2em] text-xs">
                Sign In to Portal
            </button>
        </form>
        
        <div id="studentLinks" class="mt-8 text-center space-y-6">
            <p class="text-sm font-bold text-slate-500">
                New student? <a href="/register" class="text-indigo-600 font-black hover:underline decoration-2">Register account</a>
            </p>
            <div class="pt-4 border-t border-slate-100">
                <button onclick="toggleAdmin(true)" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-black transition-colors flex items-center justify-center gap-2 mx-auto">
                     Access Admin HQ
                </button>
            </div>
        </div>

        <div id="adminLinks" class="mt-8 text-center hidden">
            <button onclick="toggleAdmin(false)" class="text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-indigo-600 transition-colors italic">
                ← Back to Student Login
            </button>
        </div>
    </div>

    <script>
        function toggleAdmin(isAdmin) {
            const card = document.getElementById('card');
            const title = document.getElementById('title');
            const btn = document.getElementById('loginBtn');
            const sLinks = document.getElementById('studentLinks');
            const aLinks = document.getElementById('adminLinks');

            if(isAdmin) {
                card.classList.replace('student-glow', 'admin-glow');
                title.innerText = "Admin Security";
                title.classList.add('text-black');
                btn.classList.replace('bg-black', 'bg-slate-900');
                sLinks.classList.add('hidden');
                aLinks.classList.remove('hidden');
            } else {
                card.classList.replace('admin-glow', 'student-glow');
                title.innerText = "Student Login";
                btn.classList.replace('bg-slate-900', 'bg-black');
                sLinks.classList.remove('hidden');
                aLinks.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
