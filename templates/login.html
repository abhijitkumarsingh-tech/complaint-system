<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="card p-4 mx-auto shadow-lg" style="max-width: 400px; border-radius: 15px;">
        <h3 class="text-center mb-4 text-primary">🛡️ Admin Login</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="admin7" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">Login</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">← Back to Home</a>
        </div>
    </div>
</body>
</html>
