<!DOCTYPE html>
<html>
<head>
    <title>Complaint Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center;">
    <div class="container bg-white p-4 rounded shadow-lg" style="max-width: 500px;">
        <h2 class="text-center mb-4">📝 Submit Complaint</h2>
        {% if tracking_id %}
            <div class="alert alert-success text-center">Success! Your ID: <strong>#{{ tracking_id }}</strong></div>
        {% endif %}
        <form action="/add" method="POST" enctype="multipart/form-data">
            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>
            <input type="text" name="subject" class="form-control mb-3" placeholder="Subject" required>
            <textarea name="message" class="form-control mb-3" placeholder="Explain your problem..." rows="3" required></textarea>
            <label class="small text-muted">Upload Proof (Optional)</label>
            <input type="file" name="file" class="form-control mb-4">
            <button class="btn btn-primary w-100 shadow">Submit Now</button>
            <div class="mt-3 text-center">
                <a href="/track" class="text-decoration-none small">🔍 Track Status</a> | 
                <a href="/login" class="text-decoration-none small">🔑 Admin Login</a>
            </div>
        </form>
    </div>
</body>
</html>
